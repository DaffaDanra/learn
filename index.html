<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐱 Cat Clicker</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      gap: 14px;
      color: #fff;
    }

    /* Stars */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 75%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  45%, #fff 0%, transparent 100%);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      font-size: 2rem;
      color: #e2b96f;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(226,185,111,0.5);
      z-index: 1;
    }

    /* Scoreboard */
    #scoreboard {
      display: flex;
      gap: 20px;
      z-index: 1;
    }
    .score-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 7px 18px;
      text-align: center;
      backdrop-filter: blur(6px);
    }
    .score-box .lbl { font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .val { font-size: 1.4rem; font-weight: bold; color: #e2b96f; }

    /* Stage */
    #stage {
      position: relative;
      width: 280px;
      cursor: pointer;
      user-select: none;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Speech bubble */
    #bubble {
      background: #fff;
      color: #333;
      border-radius: 18px;
      padding: 8px 20px;
      font-size: 1.25rem;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      transform: scale(0);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      margin-bottom: 10px;
      position: relative;
    }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #fff;
    }
    #bubble.show { transform: scale(1); }

    /* Cat image frame */
    #cat-frame {
      position: relative;
      width: 240px;
      height: 240px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 3px solid rgba(226,185,111,0.4);
      background: #111;
      transition: transform 0.1s ease;
    }

    #cat-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.2s;
    }

    /* Meme text overlay */
    #meme-top, #meme-bot {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 1.3rem;
      color: #fff;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
      padding: 6px 8px;
      letter-spacing: 1px;
      pointer-events: none;
      line-height: 1.2;
    }
    #meme-top { top: 6px; }
    #meme-bot { bottom: 6px; }

    /* Loading spinner */
    #cat-frame.loading::after {
      content: '🐱';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Click animations */
    #cat-frame.do-bounce  { animation: fBounce  0.4s ease; }
    #cat-frame.do-shake   { animation: fShake   0.4s ease; }
    #cat-frame.do-zoom    { animation: fZoom    0.35s ease; }
    #cat-frame.do-squish  { animation: fSquish  0.4s ease; }
    #cat-frame.do-spin    { animation: fSpin    0.5s ease; }
    #cat-frame.do-wiggle  { animation: fWiggle  0.45s ease; }
    #cat-frame.do-tilt    { animation: fTilt    0.4s ease; }

    @keyframes fBounce  {
      0%   { transform: translateY(0); }
      35%  { transform: translateY(-22px); }
      65%  { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }
    @keyframes fShake   {
      0%,100% { transform: rotate(0); }
      20%     { transform: rotate(-10deg); }
      40%     { transform: rotate(10deg); }
      60%     { transform: rotate(-7deg); }
      80%     { transform: rotate(7deg); }
    }
    @keyframes fZoom    {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    @keyframes fSquish  {
      0%   { transform: scaleX(1)    scaleY(1); }
      25%  { transform: scaleX(1.25) scaleY(0.75); }
      55%  { transform: scaleX(0.88) scaleY(1.15); }
      100% { transform: scaleX(1)    scaleY(1); }
    }
    @keyframes fSpin    {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.15); }
      100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes fWiggle  {
      0%,100% { transform: rotate(0); }
      15%     { transform: rotate(-12deg); }
      30%     { transform: rotate(12deg); }
      45%     { transform: rotate(-8deg); }
      60%     { transform: rotate(8deg); }
      75%     { transform: rotate(-4deg); }
    }
    @keyframes fTilt    {
      0%   { transform: rotate(0deg); }
      30%  { transform: rotate(-20deg) scale(1.1); }
      70%  { transform: rotate(20deg) scale(1.1); }
      100% { transform: rotate(0deg); }
    }

    /* Floating text */
    .floater {
      position: fixed;
      font-size: 1.3rem;
      font-weight: 900;
      color: #e2b96f;
      text-shadow: 0 0 8px rgba(226,185,111,0.8);
      pointer-events: none;
      animation: floatUp 0.85s ease forwards;
      z-index: 999;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-90px) scale(1.4); }
    }

    /* Reaction label */
    #reaction-label {
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 1px;
      min-height: 20px;
      z-index: 1;
      margin-top: 4px;
    }

    /* Milestone */
    #milestone {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2.4rem;
      font-weight: bold;
      color: #e2b96f;
      text-shadow: 0 0 30px rgba(226,185,111,0.9);
      pointer-events: none;
      z-index: 500;
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    }
    #milestone.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* Sound toggle */
    #sound-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #sound-btn:hover { background: rgba(255,255,255,0.2); }

    /* New cat button */
    #new-cat-btn {
      background: rgba(226,185,111,0.15);
      border: 1px solid rgba(226,185,111,0.4);
      border-radius: 20px;
      color: #e2b96f;
      font-size: 0.85rem;
      padding: 6px 16px;
      cursor: pointer;
      z-index: 1;
      transition: background 0.2s;
      letter-spacing: 1px;
    }
    #new-cat-btn:hover { background: rgba(226,185,111,0.3); }

    #hint {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.22);
      z-index: 1;
    }
  </style>
</head>
<body>

  <button id="sound-btn" title="Toggle sound">🔊</button>

  <h1>🐱 Cat Clicker</h1>

  <div id="scoreboard">
    <div class="score-box"><div class="lbl">Clicks</div><div class="val" id="count">0</div></div>
    <div class="score-box"><div class="lbl">Streak</div><div class="val" id="streak">0</div></div>
    <div class="score-box"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
  </div>

  <div id="stage">
    <div id="bubble">😺 Meow!</div>

    <div id="cat-frame" class="loading">
      <img id="cat-img" alt="meme cat" />
      <div id="meme-top"></div>
      <div id="meme-bot"></div>
    </div>
  </div>

  <p id="reaction-label"></p>
  <button id="new-cat-btn">🔀 New Cat</button>
  <p id="hint">click the cat!</p>

  <div id="milestone"></div>

<script>
/* ═══════════════════════════════════════
   ELEMENTS
═══════════════════════════════════════ */
const countEl     = document.getElementById('count');
const streakEl    = document.getElementById('streak');
const bestEl      = document.getElementById('best');
const bubble      = document.getElementById('bubble');
const reactionLbl = document.getElementById('reaction-label');
const catFrame    = document.getElementById('cat-frame');
const catImg      = document.getElementById('cat-img');
const memeTop     = document.getElementById('meme-top');
const memeBot     = document.getElementById('meme-bot');
const milestoneEl = document.getElementById('milestone');
const soundBtn    = document.getElementById('sound-btn');
const newCatBtn   = document.getElementById('new-cat-btn');
const stage       = document.getElementById('stage');

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let clicks = 0, streak = 0, best = 0, lastClick = 0;
let soundOn = true;
let audioCtx = null;
let bubbleTimer, eyeTimer, milestoneTimer;

/* ═══════════════════════════════════════
   CAT IMAGES  (Cataas – free cat API)
   We cycle through a pool of random cats
═══════════════════════════════════════ */
const CAT_SOURCES = [
  // cataas random cat (different sizes/tags)
  () => `https://cataas.com/cat?t=${Date.now()}`,
  () => `https://cataas.com/cat/cute?t=${Date.now()}`,
  () => `https://cataas.com/cat/funny?t=${Date.now()}`,
  () => `https://cataas.com/cat/gif?t=${Date.now()}`,
];
let srcIdx = 0;

function loadCat() {
  catFrame.classList.add('loading');
  catImg.style.opacity = '0';
  memeTop.textContent = '';
  memeBot.textContent = '';

  const url = CAT_SOURCES[srcIdx % CAT_SOURCES.length]();
  srcIdx++;

  catImg.onload = () => {
    catFrame.classList.remove('loading');
    catImg.style.opacity = '1';
    catImg.style.transition = 'opacity 0.4s';
  };
  catImg.onerror = () => {
    // fallback: try next source
    catFrame.classList.remove('loading');
    catImg.src = `https://placekitten.com/240/${220 + (srcIdx % 20)}`;
  };
  catImg.src = url;
}

loadCat();

/* ═══════════════════════════════════════
   MEME TEXTS
═══════════════════════════════════════ */
const memes = [
  { top: 'ONE DOES NOT SIMPLY',       bot: 'IGNORE A CAT' },
  { top: 'I CAN HAS',                 bot: 'CHEEZBURGER?' },
  { top: 'NOT SURE IF HUNGRY',        bot: 'OR JUST BORED' },
  { top: 'THAT FACE YOU MAKE',        bot: 'ON MONDAYS' },
  { top: 'KEEP CALM',                 bot: 'AND PET THE CAT' },
  { top: 'WHY U NO',                  bot: 'GIVE TREATS?' },
  { top: 'FIRST I WAS LIKE',          bot: 'THEN I WAS LIKE 😾' },
  { top: 'WHAT IF I TOLD YOU',        bot: 'CATS RUN THE WORLD' },
  { top: 'BRACE YOURSELF',            bot: 'ZOOMIES ARE COMING' },
  { top: 'FOREVER ALONE',             bot: '...WITH MY CAT 🐾' },
  { top: 'CHALLENGE ACCEPTED',        bot: 'KNOCK IT OFF THE TABLE' },
  { top: 'AM I THE ONLY ONE',         bot: 'WHO MEOWS BACK?' },
  { top: 'Y U STOP',                  bot: 'PETTING ME?!' },
  { top: 'ERMAHGERD',                 bot: 'LASER POINTER' },
  { top: '',                          bot: 'SEND HELP. AND TUNA.' },
  { top: 'GOOD MORNING',              bot: 'FEED ME NOW' },
  { top: 'IT\'S NOT A PHASE MOM',     bot: 'I\'M A CAT PERSON' },
  { top: 'STARING INTO YOUR SOUL',    bot: 'GIVE ME FOOD' },
];

function showMeme() {
  const m = memes[Math.floor(Math.random() * memes.length)];
  memeTop.textContent = m.top;
  memeBot.textContent = m.bot;
  setTimeout(() => {
    memeTop.textContent = '';
    memeBot.textContent = '';
  }, 2200);
}

/* ═══════════════════════════════════════
   REACTIONS
═══════════════════════════════════════ */
const reactions = [
  { msg: '😺 Meow~',        label: 'Happy meow',       anim: 'do-bounce', sound: 'meow1'  },
  { msg: '😹 Hehehe!',      label: 'Laughing hard',    anim: 'do-wiggle', sound: 'purr'   },
  { msg: '😻 I love you!',  label: 'Heart eyes ❤️',    anim: 'do-zoom',   sound: 'meow2'  },
  { msg: '😾 Go away!',     label: 'Grumpy mode',      anim: 'do-shake',  sound: 'hiss'   },
  { msg: '🙀 AHHH!',        label: 'Totally spooked',  anim: 'do-squish', sound: 'scared' },
  { msg: '😴 Zzz...',       label: 'Falling asleep',   anim: 'do-squish', sound: 'purr'   },
  { msg: '🌀 Dizzy...',     label: 'Getting dizzy',    anim: 'do-spin',   sound: 'meow1'  },
  { msg: '⭐ Wow!',         label: 'Star-struck',      anim: 'do-bounce', sound: 'meow2'  },
  { msg: '🐾 Pounce!',      label: 'Ready to attack',  anim: 'do-zoom',   sound: 'meow1'  },
  { msg: '🎵 Purrrr...',    label: 'Purring away',     anim: 'do-bounce', sound: 'purr'   },
  { msg: '🍕 Feed me!',     label: 'Hungry cat',       anim: 'do-wiggle', sound: 'meow2'  },
  { msg: '💤 Not now...',   label: 'Too tired',        anim: 'do-squish', sound: 'purr'   },
  { msg: '🔥 On fire!',     label: 'Super excited',    anim: 'do-tilt',   sound: 'meow1'  },
  { msg: '🤔 Hmm...',       label: 'Deep in thought',  anim: 'do-wiggle', sound: 'purr'   },
  { msg: '🎉 Yay!',         label: 'Party time',       anim: 'do-spin',   sound: 'meow2'  },
];

/* ═══════════════════════════════════════
   WEB AUDIO – synthesised cat sounds
═══════════════════════════════════════ */
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playMeow(variant) {
  if (!soundOn) return;
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const now = ctx.currentTime;

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (variant === 'meow1') {
      // Classic meow: rises then falls
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.linearRampToValueAtTime(900, now + 0.12);
      osc.frequency.linearRampToValueAtTime(500, now + 0.35);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.28, now + 0.05);
      gain.gain.linearRampToValueAtTime(0.22, now + 0.25);
      gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.42);

    } else if (variant === 'meow2') {
      // Higher pitched cute meow
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.linearRampToValueAtTime(1100, now + 0.1);
      osc.frequency.linearRampToValueAtTime(700, now + 0.28);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.25, now + 0.04);
      gain.gain.linearRampToValueAtTime(0, now + 0.32);
      osc.start(now);
      osc.stop(now + 0.34);

    } else if (variant === 'purr') {
      // Low rumble purr
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(28, now);
      osc.frequency.linearRampToValueAtTime(32, now + 0.5);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.12, now + 0.1);
      gain.gain.linearRampToValueAtTime(0.1, now + 0.4);
      gain.gain.linearRampToValueAtTime(0, now + 0.6);

      // Add a gentle sine on top
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(120, now);
      gain2.gain.setValueAtTime(0.06, now);
      gain2.gain.linearRampToValueAtTime(0, now + 0.6);
      osc2.start(now);
      osc2.stop(now + 0.62);

      osc.start(now);
      osc.stop(now + 0.62);

    } else if (variant === 'hiss') {
      // Hiss: noise-like with high freq
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.linearRampToValueAtTime(1200, now + 0.08);
      osc.frequency.linearRampToValueAtTime(600, now + 0.25);
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.linearRampToValueAtTime(0.05, now + 0.25);
      gain.gain.linearRampToValueAtTime(0, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.32);

    } else if (variant === 'scared') {
      // Scared: rapid rising squeak
      osc.type = 'sine';
      osc.frequency.setValueAtTime(500, now);
      osc.frequency.linearRampToValueAtTime(1400, now + 0.08);
      osc.frequency.linearRampToValueAtTime(1000, now + 0.18);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.3, now + 0.03);
      gain.gain.linearRampToValueAtTime(0, now + 0.22);
      osc.start(now);
      osc.stop(now + 0.24);
    }
  } catch(e) { /* audio not supported */ }
}

/* ═══════════════════════════════════════
   MILESTONES
═══════════════════════════════════════ */
const milestones = {
  10: '🎉 10 clicks!', 25: '⭐ 25 clicks!', 50: '🔥 50 clicks!',
  100: '💯 100!', 200: '🚀 200!', 500: '👑 500!', 1000: '🏆 1000!'
};

function showMilestone(text) {
  milestoneEl.textContent = text;
  milestoneEl.classList.add('show');
  clearTimeout(milestoneTimer);
  milestoneTimer = setTimeout(() => milestoneEl.classList.remove('show'), 1800);
}

/* ═══════════════════════════════════════
   FLOATING TEXT
═══════════════════════════════════════ */
function spawnFloat(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = text;
  el.style.left = (x - 16) + 'px';
  el.style.top  = (y - 20) + 'px';
  if (color) el.style.color = color;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

/* ═══════════════════════════════════════
   MAIN CLICK
═══════════════════════════════════════ */
stage.addEventListener('click', (e) => {
  clicks++;
  countEl.textContent = clicks;

  // Streak
  const now = Date.now();
  streak = (now - lastClick < 1500) ? streak + 1 : 1;
  lastClick = now;
  if (streak > best) { best = streak; bestEl.textContent = best; }
  streakEl.textContent = streak;

  // Milestone
  if (milestones[clicks]) showMilestone(milestones[clicks]);

  // Pick reaction
  const r = reactions[Math.floor(Math.random() * reactions.length)];

  // Bubble
  bubble.textContent = r.msg;
  bubble.classList.add('show');
  reactionLbl.textContent = r.label;

  // Meme text (every 3rd click)
  if (clicks % 3 === 0) showMeme();

  // Frame animation
  catFrame.classList.remove('do-bounce','do-shake','do-zoom','do-squish','do-spin','do-wiggle','do-tilt');
  void catFrame.offsetWidth;
  catFrame.classList.add(r.anim);

  // Sound
  playMeow(r.sound);

  // Timers
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => {
    bubble.classList.remove('show');
    reactionLbl.textContent = '';
  }, 1800);

  // Float
  const txt   = streak >= 5 ? `🔥 x${streak}` : '+1';
  const color = streak >= 5 ? '#ff6b6b' : undefined;
  spawnFloat(e.clientX, e.clientY, txt, color);
});

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
soundBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
});

newCatBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  loadCat();
});
</script>
</body>
</html>
